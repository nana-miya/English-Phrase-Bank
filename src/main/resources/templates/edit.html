<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pt-5">
<div class="container" style="max-width: 500px;">
    <div class="card p-4 shadow">
        <h3>フレーズ編集</h3>
        <form th:action="@{/update/{id}(id=${phrase.id})}" th:object="${phrase}" method="post">
            <div class="mb-3"><label>英語</label><input type="text" th:field="*{englishText}" class="form-control" required></div>
            <div class="mb-3"><label>日本語</label><input type="text" th:field="*{japaneseText}" class="form-control" required></div>
            <div class="mb-3"><label>メモ</label><input type="text" th:field="*{memo}" class="form-control"></div>
            <button type="submit" class="btn btn-primary">更新</button>
            <a th:href="@{/}" class="btn btn-secondary">戻る</a>
        </form>
    </div>
</div>
</body>
</html>
